# Shared location blocks for both HTTP and HTTPS server blocks

# Security headers handled by FastAPI middleware, but Nginx adds an extra layer
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;

# Max upload size (matches backend MAX_UPLOAD_SIZE_MB)
client_max_body_size 25M;

# API requests -> backend
# Long timeout for LLM-heavy operations (score generation, report generation)
location /api/ {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 3 minutes for LLM operations (10 categories x ~5 seconds each + report generation)
    proxy_read_timeout 180s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 10s;

    # Disable buffering for streaming responses
    proxy_buffering off;
}

# Frontend -> Next.js
location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 30s;

    # WebSocket support for Next.js HMR in dev
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Health check for load balancers
location /nginx-health {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
}

# Block access to sensitive paths
location ~ /\. {
    deny all;
    return 404;
}
