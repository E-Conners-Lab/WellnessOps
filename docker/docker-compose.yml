services:
  db:
    image: postgres:16-alpine
    container_name: wellnessops-db
    environment:
      POSTGRES_USER: wellnessops
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: wellnessops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellnessops -d wellnessops"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: wellnessops-chroma
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: wellnessops-api
    # No public port -- Nginx proxies to this
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://wellnessops:localdev@db:5432/wellnessops
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ENVIRONMENT: production
      DEBUG: "false"
      ALLOWED_ORIGINS: '["https://elliots-mac-mini.tail9f30b2.ts.net","https://localhost","http://localhost"]'
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
      - upload_data:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: wellnessops-ui
    # No public port -- Nginx proxies to this
    expose:
      - "3000"
    environment:
      # In production, API calls go through Nginx (same origin), not direct
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_BACKEND_URL: /api/v1
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: wellnessops-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  chroma_data:
  upload_data:
  certbot_www:
