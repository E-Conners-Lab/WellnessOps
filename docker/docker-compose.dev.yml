# Development override -- exposes ports directly, no Nginx required.
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d

services:
  backend:
    ports:
      - "8001:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      JWT_SECRET: "dev-only-not-for-production"
      PII_ENCRYPTION_KEY: "Xflo5X8fyKteHOxq5i6hwWYqGLdWNbJsg0UchY8Nsbc="
      ALLOWED_ORIGINS: '["http://localhost:3000"]'

  frontend:
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001/api/v1

  # Disable Nginx in dev
  nginx:
    profiles:
      - production
